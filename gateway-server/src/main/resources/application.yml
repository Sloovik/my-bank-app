server:
  port: 8765

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      routes:
        - id: accounts-service
          uri: ${ACCOUNTS_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/accounts/**
          filters:
            - RewritePath=/api/accounts/(?<segment>.*), /${segment}
        - id: cash-service
          uri: ${CASH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/cash/**
          filters:
            - RewritePath=/api/cash/(?<segment>.*), /${segment}
        - id: transfer-service
          uri: ${TRANSFER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/transfer/**
          filters:
            - RewritePath=/api/transfer/(?<segment>.*), /${segment}
        - id: notifications-service
          uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /${segment}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9000}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
