version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bankdb
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-server:
    build:
      context: ./auth-server
    container_name: auth-server
    ports:
      - "9000:9000"
    environment:
      - JWT_KEY_ID=my-bank-app-rsa-key-2024

  accounts-service:
    build:
      context: ./accounts-service
    container_name: accounts-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=accounts
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - OAUTH2_ISSUER_URI=http://auth-server:9000
      - OAUTH2_TOKEN_URI=http://auth-server:9000/oauth2/token
      - OAUTH2_CLIENT_ID=accounts-service
      - OAUTH2_CLIENT_SECRET=accounts-secret
    depends_on:
      postgres:
        condition: service_healthy
      auth-server:
        condition: service_started

  cash-service:
    build:
      context: ./cash-service
    container_name: cash-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=cash
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - OAUTH2_ISSUER_URI=http://auth-server:9000
      - OAUTH2_TOKEN_URI=http://auth-server:9000/oauth2/token
      - OAUTH2_CLIENT_ID=cash-service
      - OAUTH2_CLIENT_SECRET=cash-secret
    depends_on:
      postgres:
        condition: service_healthy
      accounts-service:
        condition: service_started

  transfer-service:
    build:
      context: ./transfer-service
    container_name: transfer-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=transfer
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - OAUTH2_ISSUER_URI=http://auth-server:9000
      - OAUTH2_TOKEN_URI=http://auth-server:9000/oauth2/token
      - OAUTH2_CLIENT_ID=transfer-service
      - OAUTH2_CLIENT_SECRET=transfer-secret
    depends_on:
      postgres:
        condition: service_healthy
      accounts-service:
        condition: service_started

  notifications-service:
    build:
      context: ./notifications-service
    container_name: notifications-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=notifications
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - OAUTH2_ISSUER_URI=http://auth-server:9000
    depends_on:
      postgres:
        condition: service_healthy

  gateway-server:
    build:
      context: ./gateway-server
    container_name: gateway-server
    ports:
      - "8765:8765"
    environment:
      - ACCOUNTS_SERVICE_URL=http://accounts-service:8081
      - CASH_SERVICE_URL=http://cash-service:8082
      - TRANSFER_SERVICE_URL=http://transfer-service:8083
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:8084
      - OAUTH2_ISSUER_URI=http://auth-server:9000
    depends_on:
      auth-server:
        condition: service_started

  front-app:
    build:
      context: ./front-app
    container_name: front-app
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_URL=http://gateway-server:8765
      - OAUTH2_CLIENT_ID=front-app
      - OAUTH2_CLIENT_SECRET=front-secret
      - OAUTH2_AUTHORIZATION_URI=http://localhost:9000/oauth2/authorize
      - OAUTH2_TOKEN_URI=http://auth-server:9000/oauth2/token
      - OAUTH2_USERINFO_URI=http://auth-server:9000/userinfo
      - OAUTH2_JWK_SET_URI=http://auth-server:9000/oauth2/jwks
      - OAUTH2_REDIRECT_URI=http://localhost:8080/login/oauth2/code/front-app
    depends_on:
      gateway-server:
        condition: service_started
      auth-server:
        condition: service_started

volumes:
  postgres_data:
