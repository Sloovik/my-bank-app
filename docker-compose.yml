version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bankdb
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      - eureka-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  auth-server:
    build:
      context: ./auth-server
    container_name: auth-server
    ports:
      - "9000:9000"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  gateway-server:
    build:
      context: ./gateway-server
    container_name: gateway-server
    ports:
      - "8765:8765"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://auth-server:9000
    depends_on:
      config-server:
        condition: service_healthy
      auth-server:
        condition: service_started

  accounts-service:
    build:
      context: ./accounts-service
    container_name: accounts-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=accounts
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://auth-server:9000
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_ACCOUNTS_SERVICE_TOKEN_URI=http://auth-server:9000/oauth2/token
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      auth-server:
        condition: service_started
      notifications-service:
        condition: service_started

  cash-service:
    build:
      context: ./cash-service
    container_name: cash-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=cash
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://auth-server:9000
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_CASH_SERVICE_TOKEN_URI=http://auth-server:9000/oauth2/token
    depends_on:
      postgres:
        condition: service_healthy
      accounts-service:
        condition: service_started

  transfer-service:
    build:
      context: ./transfer-service
    container_name: transfer-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=transfer
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://auth-server:9000
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_TRANSFER_SERVICE_TOKEN_URI=http://auth-server:9000/oauth2/token
    depends_on:
      postgres:
        condition: service_healthy
      accounts-service:
        condition: service_started

  notifications-service:
    build:
      context: ./notifications-service
    container_name: notifications-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bankdb?currentSchema=notifications
      - SPRING_DATASOURCE_USERNAME=bankuser
      - SPRING_DATASOURCE_PASSWORD=bankpassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://auth-server:9000
    depends_on:
      postgres:
        condition: service_healthy

  front-app:
    build:
      context: ./front-app
    container_name: front-app
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FRONT_APP_REDIRECT_URI=http://localhost:8080/login/oauth2/code/front-app
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_FRONT_APP_AUTHORIZATION_URI=http://localhost:9000/oauth2/authorize
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_FRONT_APP_TOKEN_URI=http://auth-server:9000/oauth2/token
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_FRONT_APP_USER_INFO_URI=http://auth-server:9000/userinfo
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_FRONT_APP_JWK_SET_URI=http://auth-server:9000/oauth2/jwks
      - GATEWAY_URL=http://gateway-server:8765
    depends_on:
      gateway-server:
        condition: service_started
      auth-server:
        condition: service_started

volumes:
  postgres_data:
