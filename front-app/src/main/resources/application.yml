server:
  port: 8080

spring:
  application:
    name: front-app
  security:
    oauth2:
      client:
        registration:
          front-app:
            client-id: ${OAUTH2_CLIENT_ID:front-app}
            client-secret: ${OAUTH2_CLIENT_SECRET:front-secret}
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/front-app}
            scope: openid,profile,ACCOUNTS_READ,ACCOUNTS_WRITE,CASH_WRITE,TRANSFER_WRITE
        provider:
          front-app:
            authorization-uri: ${OAUTH2_AUTHORIZATION_URI:http://localhost:9000/oauth2/authorize}
            token-uri: ${OAUTH2_TOKEN_URI:http://localhost:9000/oauth2/token}
            user-info-uri: ${OAUTH2_USERINFO_URI:http://localhost:9000/userinfo}
            jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:9000/oauth2/jwks}
            user-name-attribute: sub

gateway:
  url: ${GATEWAY_URL:http://localhost:8765}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
