<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Мой Банк</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f8; }
        header { background: #1a237e; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.4rem; }
        .logout-form button { background: #e53935; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .logout-form button:hover { background: #c62828; }
        main { max-width: 860px; margin: 32px auto; padding: 0 16px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 24px; }
        .card h2 { margin-top: 0; color: #1a237e; border-bottom: 2px solid #e8eaf6; padding-bottom: 8px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #424242; }
        input[type="text"], input[type="date"], input[type="number"], select {
            width: 100%; padding: 8px 10px; margin-bottom: 12px; border: 1px solid #bdbdbd;
            border-radius: 4px; box-sizing: border-box; font-size: 1rem;
        }
        input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, select:focus {
            outline: none; border-color: #1a237e;
        }
        .btn { background: #1a237e; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #283593; }
        .balance { font-size: 1.5rem; font-weight: bold; color: #1a237e; margin: 8px 0 16px; }
        .form-row { display: flex; gap: 12px; align-items: flex-end; }
        .form-row .form-group { flex: 1; }
    </style>
</head>
<body>

<header>
    <h1>Мой Банк</h1>
    <form class="logout-form" method="post" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Выйти</button>
    </form>
</header>

<main>

    <!-- Уведомления -->
    <div class="alert-success" th:if="${info}" th:text="${info}"></div>
    <div class="alert-error" th:if="${errors}" th:text="${errors}"></div>

    <!-- Блок: Обо мне -->
    <div class="card">
        <h2>Обо мне</h2>

        <div class="balance">
            Баланс: <span th:text="${sum != null ? sum : '0.00'}">0.00</span> ₽
        </div>

        <form method="post" th:action="@{/account}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label for="name">Имя</label>
            <input id="name" type="text" name="name" th:value="${name}" placeholder="Введите имя" required/>

            <label for="birthdate">Дата рождения</label>
            <input id="birthdate" type="date" name="birthdate" th:value="${birthdate}" required/>

            <button class="btn" type="submit">Сохранить</button>
        </form>
    </div>

    <!-- Блок: Операции с наличными -->
    <div class="card">
        <h2>Операции с наличными</h2>

        <form method="post" th:action="@{/cash}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <div class="form-group">
                    <label for="cashValue">Сумма</label>
                    <input id="cashValue" type="number" name="value" min="0.01" step="0.01" placeholder="0.00" required/>
                </div>
                <div class="form-group">
                    <label for="cashAction">Операция</label>
                    <select id="cashAction" name="action">
                        <option value="PUT">Пополнить</option>
                        <option value="GET">Снять</option>
                    </select>
                </div>
            </div>

            <button class="btn" type="submit">Выполнить</button>
        </form>
    </div>

    <!-- Блок: Переводы -->
    <div class="card">
        <h2>Переводы</h2>

        <form method="post" th:action="@{/transfer}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label for="transferLogin">Получатель</label>
            <select id="transferLogin" name="login">
                <option value="" disabled selected>-- Выберите получателя --</option>
                <option th:each="acc : ${accounts}"
                        th:value="${acc.login}"
                        th:text="${acc.name + ' (' + acc.login + ')'}">Пользователь</option>
            </select>

            <label for="transferValue">Сумма</label>
            <input id="transferValue" type="number" name="value" min="0.01" step="0.01" placeholder="0.00" required/>

            <button class="btn" type="submit">Перевести</button>
        </form>
    </div>

</main>

</body>
</html>
