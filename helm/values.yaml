global:
  namespace: bank
  imageTag: "0.0.1-SNAPSHOT"
  imagePullPolicy: IfNotPresent

  oauth2:
    issuerUri: "http://auth-server:9000"
    tokenUri: "http://auth-server:9000/oauth2/token"

  database:
    host: postgres
    port: 5432
    name: bankdb
    username: bankuser
    password: bankpassword

  observability:
    zipkinBaseUrl: "http://zipkin:9411"
    logstashHost: "logstash"
    logstashPort: "5044"

postgres:
  enabled: true

kafka:
  enabled: true

zipkin:
  enabled: true

prometheus:
  enabled: true

grafana:
  enabled: true

elasticsearch:
  enabled: true

logstash:
  enabled: true

kibana:
  enabled: true

auth-server:
  enabled: true

gateway-server:
  enabled: true

accounts-service:
  enabled: true

cash-service:
  enabled: true

transfer-service:
  enabled: true

notifications-service:
  enabled: true

front-app:
  enabled: true
