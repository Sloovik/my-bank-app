apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/bankdb?currentSchema=notifications"
  OAUTH2_ISSUER_URI: "http://auth-server:9000"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  ZIPKIN_ENDPOINT: "http://zipkin:9411/api/v2/spans"
