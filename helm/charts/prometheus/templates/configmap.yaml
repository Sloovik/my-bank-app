apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'accounts-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['accounts-service:8081']

      - job_name: 'cash-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['cash-service:8082']

      - job_name: 'transfer-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['transfer-service:8083']

      - job_name: 'notifications-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notifications-service:8084']

      - job_name: 'gateway-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['gateway-server:8765']

      - job_name: 'front-app'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['front-app:8080']

      - job_name: 'auth-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-server:9000']

  rules.yml: |
    groups:
      - name: bank-alerts
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application)
              /
              sum(rate(http_server_requests_seconds_count[5m])) by (application)
              > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High 5xx error rate on {{ $labels.application }}"
              description: "Error rate is {{ $value | humanizePercentage }}"

          - alert: HighLatency
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application)
              ) > 2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High p99 latency on {{ $labels.application }}"
              description: "p99 latency is {{ $value }}s"

          - alert: FailedWithdrawals
            expr: increase(bank_withdrawal_failed_total[5m]) > 10
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High failed withdrawal rate for {{ $labels.login }}"
              description: "{{ $value }} failed withdrawals in last 5m"

          - alert: FailedTransfers
            expr: increase(bank_transfer_failed_total[5m]) > 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High failed transfer rate"
              description: "{{ $value }} failed transfers in last 5m"

          - alert: FailedNotifications
            expr: increase(bank_notification_failed_total[5m]) > 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Notification delivery failures for {{ $labels.login }}"
              description: "{{ $value }} failed notifications in last 5m"
