replicaCount: 1
image:
  repository: bitnami/kafka
  tag: "3.7.0"
  pullPolicy: IfNotPresent

persistence:
  size: 2Gi

service:
  port: 9092

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

topic:
  name: bank-notifications
  partitions: 3
  replicationFactor: 1
