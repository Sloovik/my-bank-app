apiVersion: v1
kind: Pod
metadata:
  name: "kafka-test-connection"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: kafka-client
      image: bitnami/kafka:3.7.0
      command:
        - sh
        - -c
        - |
          kafka-topics.sh --bootstrap-server kafka:9092 --list
  restartPolicy: Never
