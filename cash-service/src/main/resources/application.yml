server:
  port: 8082

spring:
  application:
    name: cash-service

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:postgresql://localhost:5432/bankdb?currentSchema=cash
    username: bankuser
    password: bankpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: cash

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: cash

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
      client:
        registration:
          cash-service:
            authorization-grant-type: client_credentials
            client-id: cash-service
            client-secret: cash-secret
            scope: ACCOUNTS_WRITE,NOTIFICATIONS_WRITE
        provider:
          cash-service:
            token-uri: http://localhost:9000/oauth2/token

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      accountsClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      accountsClient:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      accountsClient:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
