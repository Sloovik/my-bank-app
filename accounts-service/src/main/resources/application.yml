server:
  port: 8081

spring:
  application:
    name: accounts-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankdb?currentSchema=accounts}
    username: ${SPRING_DATASOURCE_USERNAME:bankuser}
    password: ${SPRING_DATASOURCE_PASSWORD:bankpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9000}
      client:
        registration:
          accounts-service:
            client-id: ${OAUTH2_CLIENT_ID:accounts-service}
            client-secret: ${OAUTH2_CLIENT_SECRET:accounts-secret}
            authorization-grant-type: client_credentials
            scope: NOTIFICATIONS_WRITE
        provider:
          accounts-service:
            token-uri: ${OAUTH2_TOKEN_URI:http://localhost:9000/oauth2/token}

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      notificationsClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      notificationsClient:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      notificationsClient:
        timeoutDuration: 3s

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
