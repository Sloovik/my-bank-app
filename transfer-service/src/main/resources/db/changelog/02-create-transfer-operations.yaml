databaseChangeLog:
  - changeSet:
      id: 02-create-table-transfer-operations
      author: transfer-service
      changes:
        - createTable:
            schemaName: transfer
            tableName: transfer_operations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_login
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: to_login
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
