server:
  port: 8083

spring:
  application:
    name: transfer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankdb?currentSchema=transfer}
    username: ${SPRING_DATASOURCE_USERNAME:bankuser}
    password: ${SPRING_DATASOURCE_PASSWORD:bankpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9000}
      client:
        registration:
          transfer-service:
            client-id: ${OAUTH2_CLIENT_ID:transfer-service}
            client-secret: ${OAUTH2_CLIENT_SECRET:transfer-secret}
            authorization-grant-type: client_credentials
            scope: ACCOUNTS_WRITE NOTIFICATIONS_WRITE
        provider:
          transfer-service:
            token-uri: ${OAUTH2_TOKEN_URI:http://localhost:9000/oauth2/token}

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      accountsClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      accountsClient:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      accountsClient:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
