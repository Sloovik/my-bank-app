server:
  port: 8083

spring:
  application:
    name: transfer-service

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:postgresql://localhost:5432/bankdb?currentSchema=transfer
    username: bankuser
    password: bankpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: transfer

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: transfer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
      client:
        registration:
          transfer-service:
            authorization-grant-type: client_credentials
            client-id: transfer-service
            client-secret: transfer-secret
            scope: ACCOUNTS_WRITE,NOTIFICATIONS_WRITE
        provider:
          transfer-service:
            token-uri: http://localhost:9000/oauth2/token

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
